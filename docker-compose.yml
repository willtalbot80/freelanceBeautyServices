version: '3.8'

services:
  web:
    build: .
    command: gunicorn beauty.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # When deploying with Docker, mount your service account at /run/secrets/firebase-sa.json
      # and this will point the app to it.
      - FIREBASE_ADMIN_CREDENTIAL=/run/secrets/firebase-sa.json
    volumes:
      - .:/app
      - ./secrets/firebase-sa.json:/run/secrets/firebase-sa.json:ro
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: beauty
      POSTGRES_USER: django
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
