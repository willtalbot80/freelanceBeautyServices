name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: 'True'
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm cache clean --force || true
          npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      - name: Collect static files
        env:
          DJANGO_DEBUG: 'True'
        run: |
          python manage.py collectstatic --noinput

      - name: Run Django tests
        run: |
          python manage.py test

      - name: Upload built static (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: static
          path: |
            static
            staticfiles
name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services: {}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: beauty.settings
        run: |
          source .venv/bin/activate
          python manage.py migrate --noinput
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: beauty.settings
        run: |
          source .venv/bin/activate
          python -m pytest -q
